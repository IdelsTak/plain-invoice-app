name: Feature Task
description: Project-first implementation task
title: "feat: "
labels: ["type:feature"]
body:
  - type: textarea
    id: context
    attributes:
      label: Description
      description: Write concise prose describing problem and scope.
      placeholder: Explain the problem and intended implementation scope in 2-5 sentences.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Clear, testable completion criteria
    validations:
      required: true
