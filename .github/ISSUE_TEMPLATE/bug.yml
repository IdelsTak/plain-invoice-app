name: Bug Task
description: Defect tracked from Project-first workflow
title: "fix: "
labels: ["type:bug"]
body:
  - type: textarea
    id: context
    attributes:
      label: Description
      description: Write concise prose describing defect impact and intended fix scope.
      placeholder: Explain what is broken, impact, and intended fix scope in 2-5 sentences.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Clear, testable completion criteria
    validations:
      required: true
