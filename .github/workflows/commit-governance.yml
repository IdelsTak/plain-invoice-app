name: Commit Governance

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  validate-commit-subjects:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit subjects
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          regex='^(feat|fix|refactor|test|docs|chore|ci|build|perf)(\([a-z0-9._/-]+\))?: [a-z].+'
          bad=0
          while IFS= read -r subject; do
            [ -z "$subject" ] && continue
            if ! echo "$subject" | grep -Eq "$regex"; then
              echo "Invalid commit subject: $subject"
              bad=1
            fi
            if [ ${#subject} -gt 48 ]; then
              echo "Commit subject too long (>48): $subject"
              bad=1
            fi
          done < <(git log --format=%s "$BASE_REF..$HEAD_REF")
          if [ "$bad" -ne 0 ]; then
            echo "Commit governance validation failed"
            exit 1
          fi
