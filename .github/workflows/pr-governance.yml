name: PR Governance

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  require-summary-only-body:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR body is summary-only
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          if [ -z "${PR_BODY//[[:space:]]/}" ]; then
            echo "PR body must not be empty"
            exit 1
          fi

          # Require What changed heading
          echo "$PR_BODY" | grep -Eq '^## What changed' || {
            echo "PR body must start with '## What changed'"
            exit 1
          }

          # Disallow other markdown headings to keep summary-only format
          other_headings=$(echo "$PR_BODY" | grep -E '^## ' | grep -v '^## What changed' || true)
          if [ -n "$other_headings" ]; then
            echo "PR body must contain only the '## What changed' section"
            echo "$other_headings"
            exit 1
          fi
