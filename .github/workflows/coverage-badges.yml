name: Coverage Badges

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "26"

      - name: Run verify
        run: mvn -B -ntp verify

      - name: Generate JaCoCo badges
        uses: cicirello/jacoco-badge-generator@v2
        with:
          generate-branches-badge: true

      - name: Create badge update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "ci: refresh coverage badges"
          branch: ci/coverage-badges
          title: "ci: refresh coverage badges"
          body: |
            ## What changed
            - refreshed JaCoCo coverage badge SVG files under `.github/badges`
          labels: documentation
          add-paths: |
            .github/badges/*.svg
